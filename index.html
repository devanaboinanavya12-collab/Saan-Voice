<!DOCTYPE html>
<html>
<head>
  <title>SAAN Emergency Finance</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7ff;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .btn {
      background: #2d6cdf;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      margin: 10px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <h1>SAAN Emergency Finance Platform</h1>
  <p>Instant financial help across borders</p>
</header>

<div class="container">

  <div class="card">
    <h2>Emergency Financial Support</h2>
    <p>Get help from family and contributors during urgent situations</p>
    <button class="btn">Get Started</button>
    <button class="btn">Learn More</button>
  </div>

  <div class="card">
    <h3>Features</h3>
    <p>✔ Emergency Requests</p>
    <p>✔ Family Contributions</p>
    <p>✔ AI Verification (Simulation)</p>
    <p>✔ FX Rate Lock</p>
  </div>

</div>

</body>
</html>
