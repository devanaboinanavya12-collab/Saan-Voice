<!DOCTYPE html>
<html>
<head>
  <title>SAAN Voice</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f7ff;
    }

    .screen {
      display: none;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: #2d6cdf;
    }

    .tagline {
      font-size: 16px;
      margin-top: 10px;
      color: #555;
    }

    .btn {
      background: #2d6cdf;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      margin: 10px;
      cursor: pointer;
      width: 200px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">

  <div class="logo">SAAN VOICE</div>

  <div class="tagline">
    Emergency Financial Support Across Borders - send smiles
  </div>

  <p style="margin-top:20px;">
    👨‍🎓 Student / Migrant Support Platform
  </p>

  <button class="btn" onclick="goToScreen2()">Sign In</button>
  <button class="btn" onclick="goToScreen2()">Create Account</button>

</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">

  <div class="card">

    <h2>Create Your Account</h2>

    <input type="text" placeholder="Full Name"><br>
    <input type="email" placeholder="Email"><br>
    <input type="text" placeholder="Mobile Number"><br>
    <input type="text" placeholder="Country of Residence"><br>
    <input type="password" placeholder="Password"><br>

    <button class="btn">Continue</button>

  </div>

</div>

<script>
  function goToScreen2() {
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
  }
</script>

</body>
</html>
